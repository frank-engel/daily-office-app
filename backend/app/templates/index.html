{% extends "base.html" %}
{% block title %}Anglican Daily Office{% endblock %}

{% block content %}
<div class="py-16 text-center">
  <h1 class="text-3xl font-bold text-stone-800 mb-2 tracking-tight">Anglican Daily Office</h1>
  <p class="text-stone-500 text-sm tracking-widest uppercase mb-10">Book of Common Prayer 1979</p>

  <a href="/office/{{ today }}"
     class="inline-block bg-stone-800 text-stone-100 px-10 py-3 rounded text-base hover:bg-stone-700 active:bg-stone-900 transition-colors shadow">
    Open Today's Office
  </a>

  <p class="mt-5 text-stone-400 text-sm">{{ today }}</p>
</div>
{% endblock %}
