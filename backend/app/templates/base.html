<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Daily Office{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <style>
    body { font-family: 'Georgia', 'Times New Roman', serif; }
  </style>
</head>
<body class="bg-stone-50 text-stone-900 min-h-screen">

  <nav class="bg-stone-800 text-stone-100 px-4 py-3 flex items-center justify-between sticky top-0 z-10 shadow">
    <a href="/" class="text-base font-semibold tracking-wide hover:text-stone-300 transition-colors">
      Daily Office
    </a>
    <div class="flex items-center gap-4">
      {% if user %}
        <a href="/habits" class="text-stone-400 text-xs tracking-widest uppercase hover:text-stone-200 transition-colors">Habits</a>
        <a href="/profile" class="text-stone-400 text-xs tracking-widest uppercase hover:text-stone-200 transition-colors">
          {{ user.display_name or user.email.split('@')[0] }}
        </a>
        <form method="post" action="/logout" class="inline">
          <button type="submit" class="text-stone-500 text-xs tracking-widest uppercase hover:text-stone-300 transition-colors">
            Sign Out
          </button>
        </form>
      {% else %}
        <a href="/login" class="text-stone-400 text-xs tracking-widest uppercase hover:text-stone-200 transition-colors">Sign In</a>
      {% endif %}
      <span class="text-stone-600 text-xs tracking-widest uppercase">BCP 1979</span>
    </div>
  </nav>

  <main class="max-w-2xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
